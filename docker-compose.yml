x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow123}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *default-logging
    cpus: "1.00"
    mem_limit: 1g
    mem_reservation: 512m
    pids_limit: 512

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    logging: *default-logging
    cpus: "1.00"
    mem_limit: 1g
    mem_reservation: 512m
    pids_limit: 512

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow123}@postgres:5432/${POSTGRES_DB:-mlflow}
      MLFLOW_ARTIFACT_ROOT: s3://${MLFLOW_BUCKET_NAME:-mlflow}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      MLFLOW_PORT: 5000
    ports:
      - "${MLFLOW_HOST_PORT:-5000}:5000"
    volumes:
      - mlflow_data:/mlflow
    logging: *default-logging
    cpus: "0.80"
    mem_limit: 768m
    mem_reservation: 384m
    pids_limit: 512

  torchserve:
    image: pytorch/torchserve:0.11.1-cpu
    restart: unless-stopped
    depends_on:
      - mlflow
    environment:
      TS_CONFIG_FILE: /home/model-server/config/config.properties
      TS_SCORE_THRESHOLD: ${TS_SCORE_THRESHOLD:-0.2}
    ports:
      - "${TORCHSERVE_INFERENCE_HOST_PORT:-8080}:8080"
      - "${TORCHSERVE_MANAGEMENT_HOST_PORT:-8081}:8081"
      - "${TORCHSERVE_METRICS_HOST_PORT:-8082}:8082"
    volumes:
      - ./model-store:/home/model-server/model-store
      - ./docker/torchserve/config.properties:/home/model-server/config/config.properties:ro
    logging: *default-logging
    cpus: "2.00"
    mem_limit: 4g
    mem_reservation: 2g
    pids_limit: 1024

  trainer:
    profiles: ["training"]
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mlflow
      - pushgateway
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-uav-vit-thesis}
      PUSHGATEWAY_URL: http://pushgateway:9091
    volumes:
      - ./:/app
    command: ["uav-vit", "--help"]
    logging: *default-logging
    cpus: "3.00"
    mem_limit: 8g
    mem_reservation: 3g
    pids_limit: 1024

  pushgateway:
    image: prom/pushgateway:v1.10.0
    restart: unless-stopped
    ports:
      - "${PUSHGATEWAY_HOST_PORT:-9091}:9091"
    logging: *default-logging
    cpus: "0.40"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

  run-metrics-exporter:
    profiles: ["training"]
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uav-vit-exporter", "--runs-dir", "/app/runs", "--interval", "10", "--port", "9108"]
    volumes:
      - ./:/app
    ports:
      - "${RUN_METRICS_EXPORTER_HOST_PORT:-9108}:9108"
    logging: *default-logging
    cpus: "0.60"
    mem_limit: 512m
    mem_reservation: 256m
    pids_limit: 256

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow123}@postgres:5432/${POSTGRES_DB:-mlflow}?sslmode=disable
    ports:
      - "${POSTGRES_EXPORTER_HOST_PORT:-9187}:9187"
    logging: *default-logging
    cpus: "0.40"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    ports:
      - "${CADVISOR_HOST_PORT:-8088}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    logging: *default-logging
    cpus: "0.70"
    mem_limit: 512m
    mem_reservation: 256m
    pids_limit: 512

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "${NODE_EXPORTER_HOST_PORT:-9100}:9100"
    logging: *default-logging
    cpus: "0.40"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

  process-exporter:
    image: ncabatoff/process-exporter:latest
    restart: unless-stopped
    command:
      - "--procfs=/host/proc"
      - "--config.path=/etc/process-exporter/process-exporter.yml"
    volumes:
      - /proc:/host/proc:ro
      - ./monitoring/process-exporter/process-exporter.yml:/etc/process-exporter/process-exporter.yml:ro
    ports:
      - "${PROCESS_EXPORTER_HOST_PORT:-9256}:9256"
    logging: *default-logging
    cpus: "0.40"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    ports:
      - "${BLACKBOX_HOST_PORT:-9116}:9115"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    logging: *default-logging
    cpus: "0.40"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    logging: *default-logging
    cpus: "0.40"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    depends_on:
      - pushgateway
      - blackbox-exporter
      - alertmanager
      - process-exporter
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    logging: *default-logging
    cpus: "1.50"
    mem_limit: 2g
    mem_reservation: 1g
    pids_limit: 512

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:18090/api/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging: *default-logging
    cpus: "0.80"
    mem_limit: 768m
    mem_reservation: 384m
    pids_limit: 512

  control-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mlflow
    environment:
      UAV_CONTROL_WORKSPACE: /app
      UAV_CONTROL_STATE_DIR: /app/workspace_state
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-uav-vit-thesis}
      TORCHSERVE_MANAGEMENT_URL: http://torchserve:8081
      TORCHSERVE_INFERENCE_URL: http://torchserve:8080
    command: ["uav-vit-control"]
    ports:
      - "${CONTROL_API_HOST_PORT:-18070}:8010"
    volumes:
      - ./:/app
    logging: *default-logging
    cpus: "1.00"
    mem_limit: 1g
    mem_reservation: 512m
    pids_limit: 512

  ui:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - control-api
      - grafana
      - prometheus
      - mlflow
      - alertmanager
      - process-exporter
    ports:
      - "${UI_HOST_PORT:-8090}:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./docker/ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging
    cpus: "0.50"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 256

volumes:
  postgres_data:
  minio_data:
  mlflow_data:
  prometheus_data:
  grafana_data:
