server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 ipv6=off valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/prometheus/ {
    set $prometheus_upstream prometheus:9090;
    rewrite ^/api/prometheus/(.*)$ /$1 break;
    proxy_pass http://$prometheus_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/mlflow/ {
    set $mlflow_upstream mlflow:5000;
    rewrite ^/api/mlflow/(.*)$ /$1 break;
    proxy_pass http://$mlflow_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/grafana/ {
    set $grafana_upstream grafana:3000;
    proxy_pass http://$grafana_upstream$uri$is_args$args;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /api/grafana;
  }

  location /api/pushgateway/ {
    set $pushgateway_upstream pushgateway:9091;
