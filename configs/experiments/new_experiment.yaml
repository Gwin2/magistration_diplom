experiment:
  name: new_experiment
  seed: 42
paths:
  train_images: data/processed/uav_coco/images/train
  val_images: data/processed/uav_coco/images/val
  test_images: data/processed/uav_coco/images/test
  train_annotations: data/processed/uav_coco/annotations/instances_train.json
  val_annotations: data/processed/uav_coco/annotations/instances_val.json
  test_annotations: data/processed/uav_coco/annotations/instances_test.json
  output_dir: runs/new_experiment
mlflow:
  enabled: true
  tracking_uri: http://mlflow:5000
  experiment_name: uav-vit-thesis
  run_name: new_experiment
  log_checkpoints: true
tensorboard:
  enabled: true
model:
  name: yolos_tiny
  checkpoint: hustvl/yolos-tiny
  num_labels: 1
  id2label:
    '0': uav
  label2id:
    uav: 0
  train_backbone: true
  custom_modules: []
train:
  device: auto
  epochs: 30
  batch_size: 4
  learning_rate: 2.0e-05
  weight_decay: 0.0001
  num_workers: 4
  grad_clip_norm: 1.0
  log_interval: 20
  mixed_precision: true
  eval_every_epoch: true
  checkpoint_metric: map
  checkpoint_mode: max
eval:
  score_threshold: 0.1
  latency_warmup_iters: 10
  latency_iters: 50
data:
  processor_size: 800
  normalize_boxes: false
