apiVersion: apps/v1
kind: Deployment
metadata:
  name: run-metrics-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: run-metrics-exporter
  template:
    metadata:
      labels:
        app: run-metrics-exporter
    spec:
      containers:
        - name: exporter
          image: your-registry/uav-vit-trainer:latest
          command:
            - uav-vit-exporter
            - --runs-dir
            - /app/runs
            - --interval
            - "10"
            - --port
            - "9108"
          ports:
            - containerPort: 9108
          volumeMounts:
            - name: runs
              mountPath: /app/runs
      volumes:
        - name: runs
          persistentVolumeClaim:
            claimName: runs-pvc
