apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: UAV Dashboards
        folder: UAV-MLOps
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
