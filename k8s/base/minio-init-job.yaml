apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:RELEASE.2025-01-17T23-25-50Z
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: uav-mlops-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-mlops-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MLFLOW_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: uav-mlops-config
                  key: MLFLOW_BUCKET_NAME
          command:
            - /bin/sh
            - -c
            - >
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD" &&
              mc mb -p "local/$MLFLOW_BUCKET_NAME" || true
