apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  uav-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [{"expr": "probe_success{job=\"blackbox-http\"}", "legendFormat": "{{instance}}", "refId": "A"}],
          "title": "Service Availability",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [{"expr": "uav_eval_map_50", "legendFormat": "{{experiment}}/{{model}} {{split}}", "refId": "A"}],
          "title": "Evaluation mAP@50",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "ms"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [{"expr": "uav_eval_latency_ms", "legendFormat": "{{experiment}}/{{model}} {{split}}", "refId": "A"}],
          "title": "Evaluation Latency",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [{"expr": "uav_run_exporter_runs_total", "legendFormat": "tracked runs", "refId": "A"}],
          "title": "Tracked Runs",
          "type": "stat"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["uav", "mlops"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "UAV Monitoring (K8s)",
      "uid": "uav-k8s-overview",
      "version": 1
    }
